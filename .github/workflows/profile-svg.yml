name: Profile SVG build

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Update profile SVG stats
        env:
          USER_NAME: Navneethd8
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python today.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add light_mode.svg dark_mode.svg
          git diff --staged --quiet || git commit -m "Update profile SVG stats"
          git push
